version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: logpose-postgres
    environment:
      POSTGRES_USER: logpose_user
      POSTGRES_PASSWORD: logpose_password
      POSTGRES_DB: logpose_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: logpose-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data: